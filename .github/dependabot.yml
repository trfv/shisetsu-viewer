version: 2
updates:
  - package-ecosystem: "github-actions"
    # 複合アクション (.github/actions/scrape) 内の action は "/" では追跡されないため明示する
    directories:
      - "/"
      - "/.github/actions/scrape"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      include:
        - "*"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
      include:
        - "*"
    groups:
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        applies-to: version-updates
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
      build:
        applies-to: version-updates
        patterns:
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "@esbuild/*"
          - "@swc/*"
          - "@rollup/*"
          - "wrangler"
      linting:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "prettier-*"
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        exclude-patterns:
          - "react"
          - "react-dom"
      development-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "@esbuild/*"
          - "@swc/*"
          - "@rollup/*"
          - "wrangler"
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "prettier-*"
      security-production:
        applies-to: security-updates
        dependency-type: "production"
        patterns:
          - "*"
      security-development:
        applies-to: security-updates
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@typescript/native-preview"
      - dependency-name: "@mizchi/lsmcp"
