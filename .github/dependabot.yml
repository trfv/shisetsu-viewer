version: 2
updates:
  - package-ecosystem: "github-actions"
    # 複合アクション (.github/actions/scrape) 内の action は "/" では追跡されないため明示する
    directories:
      - "/"
      - "/.github/actions/scrape"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      include:
        - "*"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
      include:
        - "*"
    groups:
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        applies-to: version-updates
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
      build:
        applies-to: version-updates
        patterns:
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "@esbuild/*"
          - "@swc/*"
          - "@rollup/*"
          - "wrangler"
      linting:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "prettier-*"
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        exclude-patterns:
          - "react"
          - "react-dom"
      development-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "@esbuild/*"
          - "@swc/*"
          - "@rollup/*"
          - "wrangler"
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "prettier-*"
      security-production:
        applies-to: security-updates
        dependency-type: "production"
        patterns:
          - "*"
      security-development:
        applies-to: security-updates
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@mizchi/lsmcp"
      # typecheck は typescript7 (npm alias) で行い、素の typescript (版は root package.json 参照) は
      # typescript-eslint / knip / prettier-plugin-organize-imports の API 提供役。
      # これらが TS7 対応 (7.1 の新 API 以降、目安 2026 秋) するまで semver-major を固定。
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # ESLint 10 は eslint-plugin-react が peer 未対応 (#3977) のため major を固定。
      # プラグイン対応後に解除する。
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # @types/node は実行時 Node (engines: >=24, .node-version) に合わせて 24.x に固定する。
      # 型だけ先行すると Node 24 に存在しない API がコンパイルを通ってしまう。
      # Node 26 LTS 化 (2026-10) で .node-version ごと一斉更新する。
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
