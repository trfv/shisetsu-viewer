name: Rotate M2M Token

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    # Run ~1 hour before each scraper run (scraper runs at 0 4,16 * * *) so the
    # M2M token (24h TTL) is always fresh. Interim measure until the backend
    # migration (GitHub OIDC) removes M2M tokens entirely.
    - cron: "23 3,15 * * *"

jobs:
  rotate:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Fetch M2M token from Auth0
        id: fetch-token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
        run: |
          RESPONSE=$(curl -sf --retry 3 --retry-delay 5 --retry-max-time 30 \
            --request POST \
            --url "https://${AUTH0_DOMAIN}/oauth/token" \
            --header 'content-type: application/json' \
            --data "{\"client_id\":\"${AUTH0_CLIENT_ID}\",\"client_secret\":\"${AUTH0_CLIENT_SECRET}\",\"audience\":\"${AUTH0_AUDIENCE}\",\"grant_type\":\"client_credentials\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to fetch M2M token from Auth0"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT
          echo "Token fetched successfully (expires_in: ${EXPIRES_IN}s)"

      - name: Update M2M_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_RW }}
          NEW_TOKEN: ${{ steps.fetch-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "$NEW_TOKEN" | gh secret set M2M_TOKEN --repo "$REPO"
          echo "M2M_TOKEN secret updated successfully"

      - name: Verify secret was updated
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_RW }}
          REPO: ${{ github.repository }}
        run: |
          UPDATED_AT=$(gh secret list --repo "$REPO" --json name,updatedAt \
            --jq '.[] | select(.name=="M2M_TOKEN") | .updatedAt')
          if [ -z "$UPDATED_AT" ]; then
            echo "::error::M2M_TOKEN secret not found after update"
            exit 1
          fi
          echo "M2M_TOKEN last updated: ${UPDATED_AT}"

      - name: File issue on rotation failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "[rotate-m2m-token] M2M トークンの自動ローテーションが失敗" \
            --body "定期ローテーションが失敗しました。M2M_TOKEN が失効するとスクレイプの Hasura 認証が失敗し続けます。Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
