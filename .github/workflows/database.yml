name: Update Database

permissions:
  contents: read
  id-token: write # D1 API への GitHub OIDC 認証（dual-write）

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: "Municipality to update"
        required: true
        type: choice
        options:
          - all
          - tokyo-koutou
          - tokyo-bunkyo
          - tokyo-kita
          - tokyo-toshima
          - tokyo-edogawa
          - tokyo-arakawa
          - tokyo-sumida
          - tokyo-ota
          - tokyo-suginami
          - tokyo-chuo
          - tokyo-meguro
          - kanagawa-kawasaki

jobs:
  prepare:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    outputs:
      municipality: ${{ steps.set-municipality.outputs.municipality }}
      nodeModulesCacheKey: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
    steps:
      - name: Set municipality
        id: set-municipality
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.municipality }}" != "all" ]; then
            echo "municipality=${{ github.event.inputs.municipality }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set cache keys
        id: set-cache-keys
        run: |
          NODE_MODULES_HASH=$(sha256sum package-lock.json | awk '{ print $1 }')
          echo "nodeModulesCacheKey=${{ runner.os }}-node-modules-${NODE_MODULES_HASH}" >> $GITHUB_OUTPUT
      - name: Set Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version-file: .node-version
      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: "**/node_modules"
          key: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
      - name: Run npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts

  update:
    needs: prepare
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version-file: .node-version
      - name: Restore cached node_modules
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: "**/node_modules"
          key: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
      - name: Update database data
        shell: bash
        working-directory: packages/scraper
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          # dual-write のキルスイッチ（未設定なら D1 書き込みをスキップ）
          D1_API_ENDPOINT: ${{ vars.D1_API_ENDPOINT }}
        run: |
          node tools/updateInstitutions.ts ${{ needs.prepare.outputs.municipality }}
