permissions:
  contents: read
name: Run Scraper

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: "Municipality to scrape"
        required: true
        type: choice
        options:
          - tokyo-koutou
          - tokyo-arakawa
          - tokyo-kita
          - tokyo-chuo
          - tokyo-sumida
          - tokyo-bunkyo
          - tokyo-toshima
          - tokyo-ota
          - tokyo-edogawa
          - tokyo-meguro
          - kanagawa-kawasaki
          - all
  schedule:
    - cron: "0 4,16 * * *"

jobs:
  prepare:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      municipality: ${{ steps.set-matrix.outputs.municipality }}
      shardIndex: ${{ steps.set-matrix.outputs.shardIndex }}
      shardTotal: ${{ steps.set-matrix.outputs.shardTotal }}
      nodeModulesCacheKey: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
      playwrightCacheKey: ${{ steps.set-cache-keys.outputs.playwrightCacheKey }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.municipality }}" != "all" ]; then
            echo "municipality=${{ github.event.inputs.municipality }}" >> $GITHUB_OUTPUT
            echo "shardIndex=[$(seq -s ',' 1 20)]" >> $GITHUB_OUTPUT
            echo "shardTotal=[20]" >> $GITHUB_OUTPUT
          else
            echo "shardIndex=[$(seq -s ',' 1 100)]" >> $GITHUB_OUTPUT
            echo "shardTotal=[100]" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set cache keys
        id: set-cache-keys
        run: |
          NODE_MODULES_HASH=$(sha256sum package-lock.json | awk '{ print $1 }')
          echo "nodeModulesCacheKey=${{ runner.os }}-node-modules-${NODE_MODULES_HASH}" >> $GITHUB_OUTPUT
          echo "playwrightCacheKey=${{ runner.os }}-playwright-${NODE_MODULES_HASH}" >> $GITHUB_OUTPUT
      - name: Set Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version: "24"
      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: "**/node_modules"
          key: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
      - name: Run npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.set-cache-keys.outputs.playwrightCacheKey }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt ${attempt})"
            if timeout -k 30 180 npx playwright install --with-deps chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "playwright install attempt ${attempt} timed out or failed; retrying" >&2
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1

  scrape:
    name: Scrape (${{ matrix.shardIndex }}, ${{ matrix.shardTotal }})
    needs: prepare
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shardIndex: ${{ fromJson(needs.prepare.outputs.shardIndex) }}
        shardTotal: ${{ fromJson(needs.prepare.outputs.shardTotal) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Start Scraper
        uses: ./.github/actions/scrape
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET }}
        with:
          municipality: ${{ needs.prepare.outputs.municipality }}
          shardIndex: ${{ matrix.shardIndex }}
          shardTotal: ${{ matrix.shardTotal }}
          nodeModulesCacheKey: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
          playwrightCacheKey: ${{ needs.prepare.outputs.playwrightCacheKey }}
          debug: "false"

  prepare_retry:
    runs-on: ubuntu-latest
    needs: scrape
    if: ${{ !cancelled() }}
    outputs:
      failedShards: ${{ steps.collect-failures.outputs.failedShards }}
    steps:
      - name: Collect failed shards
        id: collect-failures
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });
              console.log(`Found ${jobs.length} total jobs via pagination.`);
              const failedShards = jobs
                .filter((job) => job.name.startsWith('Scrape') && job.conclusion === 'failure')
                .map((job) => job.name.match(/Scrape \((\d+),\s(\d+)\)/).slice(1))
                .filter((arr) => arr.length === 2)
                .map((arr) => ({ shardIndex: arr[0], shardTotal: arr[1] }));
              console.log(`Failed shards: ${JSON.stringify(failedShards)}`);
              core.setOutput('failedShards', JSON.stringify(failedShards));
            } catch (error) {
              core.setFailed(`Failed to fetch jobs or process results: ${error.message}`);
              core.setOutput('failedShards', '[]');
            }

  retry_scrape:
    name: Retry Scrape (${{ matrix.shardIndex }}, ${{ matrix.shardTotal }})
    needs:
      - prepare
      - prepare_retry
    if: needs.prepare_retry.outputs.failedShards != '[]'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.prepare_retry.outputs.failedShards)}}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Start Scraper
        uses: ./.github/actions/scrape
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET }}
        with:
          municipality: ${{ needs.prepare.outputs.municipality }}
          shardIndex: ${{ matrix.shardIndex }}
          shardTotal: ${{ matrix.shardTotal }}
          nodeModulesCacheKey: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
          playwrightCacheKey: ${{ needs.prepare.outputs.playwrightCacheKey }}
          debug: "true"
          phase: "retry"

  collect_failures:
    name: Collect structural failures
    runs-on: ubuntu-latest
    needs:
      - scrape
      - prepare_retry
      - retry_scrape
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download failure artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: failures-retry-*
          path: failures
          merge-multiple: true
      - name: Aggregate and upsert tracker issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const MARKER = '<!-- scraper-repair-tracker -->';
            const TITLE = '[scraper-repair] 構造変化の疑い';

            const records = [];
            function walk(dir) {
              let entries = [];
              try { entries = fs.readdirSync(dir, { withFileTypes: true }); } catch { return; }
              for (const e of entries) {
                const p = path.join(dir, e.name);
                if (e.isDirectory()) { walk(p); continue; }
                if (!e.name.endsWith('.json')) continue;
                try {
                  const r = JSON.parse(fs.readFileSync(p, 'utf8'));
                  if (r && (r.classification === 'structural' || r.classification === 'unknown')) {
                    records.push(r);
                  }
                } catch (_) { /* skip malformed */ }
              }
            }
            walk('failures');

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const tracker = open.find(
              (i) => i.title === TITLE && (i.body || '').includes(MARKER)
            );

            if (records.length === 0) {
              if (tracker) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  body: '直近の定期実行で構造系失敗は検出されませんでした。自動クローズします。',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  state: 'closed',
                });
              }
              return;
            }

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `${MARKER}\n\n`;
            body += `定期実行で **構造変化の疑い** がある失敗を検出しました（retry 後も解消せず）。\n\n`;
            body += `修復するには手元の Claude Code で \`/repair-scraper <municipality>\` を実行してください。\n\n`;
            body += `| 自治体 | 施設 | 失敗ステップ | 分類 | エラー |\n|---|---|---|---|---|\n`;
            // GitHub Issue の body は最大 65,536 文字。件数が多いと upsert が 422 で落ちるため上限を設ける。
            const MAX_ROWS = 200;
            for (const r of records.slice(0, MAX_ROWS)) {
              const esc = (v) => String(v ?? '').replace(/\|/g, '\\|');
              const msg = esc(r.errorMessage).replace(/\n/g, ' ').slice(0, 120);
              body += `| ${esc(r.municipality)} | ${esc(r.facility)} | ${r.failedStep} | ${r.classification} | ${msg} |\n`;
            }
            if (records.length > MAX_ROWS) {
              body += `\n_他 ${records.length - MAX_ROWS} 件の失敗は省略（全件はアーティファクト参照）_\n`;
            }
            body += `\n[失敗時のアーティファクト（DOM/screenshot）をダウンロード](${runUrl})\n\n`;
            body += `_最終更新: run ${context.runId}_`;

            if (tracker) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                body, state: 'open',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title: TITLE, body,
              });
            }
