permissions:
  contents: read
  id-token: write # D1 API への GitHub OIDC 認証（dual-write）
name: Run Scraper

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: "Municipality to scrape"
        required: true
        type: choice
        options:
          - tokyo-koutou
          - tokyo-arakawa
          - tokyo-kita
          - tokyo-chuo
          - tokyo-sumida
          - tokyo-bunkyo
          - tokyo-toshima
          - tokyo-ota
          - tokyo-edogawa
          - tokyo-meguro
          - kanagawa-kawasaki
          - all
      density:
        description: "Tests per shard (higher = fewer shards)"
        required: false
        default: "5"
        type: string
  schedule:
    # JST 17:23 / 05:23 起点。GitHub cron の実測遅延（最大 ~3.7h）を足しても
    # ota のメンテナンス窓（JST 02:00-05:00）に到達しない時刻に置く。
    # 分を 23 にするのは毎時 0 分の混雑を避けるため。
    - cron: "23 8,20 * * *"

jobs:
  prepare:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      nodeModulesCacheKey: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
      playwrightCacheKey: ${{ steps.set-cache-keys.outputs.playwrightCacheKey }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set cache keys
        id: set-cache-keys
        run: |
          NODE_MODULES_HASH=$(sha256sum package-lock.json | awk '{ print $1 }')
          echo "nodeModulesCacheKey=${{ runner.os }}-node-modules-${NODE_MODULES_HASH}" >> $GITHUB_OUTPUT
          echo "playwrightCacheKey=${{ runner.os }}-playwright-${NODE_MODULES_HASH}" >> $GITHUB_OUTPUT
      - name: Set Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version-file: .node-version
      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: "**/node_modules"
          key: ${{ steps.set-cache-keys.outputs.nodeModulesCacheKey }}
      - name: Run npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.set-cache-keys.outputs.playwrightCacheKey }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt ${attempt})"
            if timeout -k 30 180 npx playwright install --with-deps chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "playwright install attempt ${attempt} timed out or failed; retrying" >&2
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1
      - name: Set matrix
        id: set-matrix
        working-directory: packages/scraper
        env:
          # dispatch で自治体を指定した場合は registry の CI 除外を解除して --list に含める
          SCRAPER_FORCE_INCLUDE: ${{ github.event.inputs.municipality }}
          CI: "true"
          # dispatch 入力は必ず env 経由で渡す。run: に ${{ }} で直接展開すると
          # shell のパース前にテキスト置換されるため、任意コマンド実行を許してしまう
          MUNICIPALITY: ${{ github.event.inputs.municipality }}
          DENSITY: ${{ github.event.inputs.density || '5' }}
        run: |
          MATRIX=$(node scripts/shardMatrix.ts "${MUNICIPALITY:-all}" --density "${DENSITY}")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  scrape:
    name: Scrape ${{ matrix.municipality }} (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: prepare
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Start Scraper
        uses: ./.github/actions/scrape
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          # dual-write のキルスイッチ: repository variable が未設定なら空 → scraper は D1 書き込みをスキップ
          D1_API_ENDPOINT: ${{ vars.D1_API_ENDPOINT }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        with:
          municipality: ${{ matrix.municipality }}
          shardIndex: ${{ matrix.shardIndex }}
          shardTotal: ${{ matrix.shardTotal }}
          nodeModulesCacheKey: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
          playwrightCacheKey: ${{ needs.prepare.outputs.playwrightCacheKey }}
          debug: "false"
          jpProxyUrl: ${{ vars.JP_PROXY_URL }}

  prepare_retry:
    runs-on: ubuntu-latest
    needs: scrape
    if: ${{ !cancelled() }}
    outputs:
      failedShards: ${{ steps.collect-failures.outputs.failedShards }}
    steps:
      - name: Collect failed shards
        id: collect-failures
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });
              console.log(`Found ${jobs.length} total jobs via pagination.`);
              const failedShards = jobs
                .filter((job) => job.name.startsWith('Scrape ') && job.conclusion === 'failure')
                .map((job) => job.name.match(/^Scrape (\S+) \((\d+)\/(\d+)\)$/))
                .filter((m) => m !== null)
                .map((m) => ({ municipality: m[1], shardIndex: m[2], shardTotal: m[3] }));
              console.log(`Failed shards: ${JSON.stringify(failedShards)}`);
              core.setOutput('failedShards', JSON.stringify(failedShards));
            } catch (error) {
              core.setFailed(`Failed to fetch jobs or process results: ${error.message}`);
              core.setOutput('failedShards', '[]');
            }

  retry_scrape:
    name: Retry Scrape ${{ matrix.municipality }} (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs:
      - prepare
      - prepare_retry
    if: needs.prepare_retry.outputs.failedShards != '[]'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.prepare_retry.outputs.failedShards)}}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Start Scraper
        uses: ./.github/actions/scrape
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          # dual-write のキルスイッチ: repository variable が未設定なら空 → scraper は D1 書き込みをスキップ
          D1_API_ENDPOINT: ${{ vars.D1_API_ENDPOINT }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        with:
          municipality: ${{ matrix.municipality }}
          shardIndex: ${{ matrix.shardIndex }}
          shardTotal: ${{ matrix.shardTotal }}
          nodeModulesCacheKey: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
          playwrightCacheKey: ${{ needs.prepare.outputs.playwrightCacheKey }}
          debug: "true"
          phase: "retry"
          jpProxyUrl: ${{ vars.JP_PROXY_URL }}

  collect_failures:
    name: Collect structural failures
    runs-on: ubuntu-latest
    needs:
      - scrape
      - prepare_retry
      - retry_scrape
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download failure artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: failures-retry-*
          path: failures
          merge-multiple: true
      - name: Aggregate and upsert tracker issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const MARKER = '<!-- scraper-repair-tracker -->';
            const TITLE = '[scraper-repair] 構造変化の疑い';

            const records = [];
            function walk(dir) {
              let entries = [];
              try { entries = fs.readdirSync(dir, { withFileTypes: true }); } catch { return; }
              for (const e of entries) {
                const p = path.join(dir, e.name);
                if (e.isDirectory()) { walk(p); continue; }
                if (!e.name.endsWith('.json')) continue;
                try {
                  const r = JSON.parse(fs.readFileSync(p, 'utf8'));
                  if (r && (r.classification === 'structural' || r.classification === 'unknown')) {
                    records.push(r);
                  }
                } catch (_) { /* skip malformed */ }
              }
            }
            walk('failures');

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const tracker = open.find(
              (i) => i.title === TITLE && (i.body || '').includes(MARKER)
            );

            if (records.length === 0) {
              if (tracker) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  body: '直近の定期実行で構造系失敗は検出されませんでした。自動クローズします。',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  state: 'closed',
                });
              }
              return;
            }

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `${MARKER}\n\n`;
            body += `定期実行で **構造変化の疑い** がある失敗を検出しました（retry 後も解消せず）。\n\n`;
            body += `修復するには手元の Claude Code で \`/repair-scraper <municipality>\` を実行してください。\n\n`;
            body += `| 自治体 | 施設 | 失敗ステップ | 分類 | エラー |\n|---|---|---|---|---|\n`;
            // GitHub Issue の body は最大 65,536 文字。件数が多いと upsert が 422 で落ちるため上限を設ける。
            const MAX_ROWS = 200;
            for (const r of records.slice(0, MAX_ROWS)) {
              const esc = (v) => String(v ?? '').replace(/\|/g, '\\|');
              const msg = esc(r.errorMessage).replace(/\n/g, ' ').slice(0, 120);
              body += `| ${esc(r.municipality)} | ${esc(r.facility)} | ${r.failedStep} | ${r.classification} | ${msg} |\n`;
            }
            if (records.length > MAX_ROWS) {
              body += `\n_他 ${records.length - MAX_ROWS} 件の失敗は省略（全件はアーティファクト参照）_\n`;
            }
            body += `\n[失敗時のアーティファクト（DOM/screenshot）をダウンロード](${runUrl})\n\n`;
            body += `_最終更新: run ${context.runId}_`;

            if (tracker) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                body, state: 'open',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title: TITLE, body,
              });
            }

  parity:
    name: Hasura/D1 parity
    runs-on: ubuntu-latest
    needs:
      - prepare
      - scrape
      - prepare_retry
      - retry_scrape
    # collect_failures と同条件: retry まで終わった最終状態を 1 回だけ突合する。
    # D1_API_ENDPOINT（dual-write キルスイッチ）が空なら D1 に書いていないので突合しない。
    if: ${{ !cancelled() && vars.D1_API_ENDPOINT != '' }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # D1 API への GitHub OIDC 認証
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version-file: .node-version
      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: "**/node_modules"
          key: ${{ needs.prepare.outputs.nodeModulesCacheKey }}
      - name: Run npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts
      - name: Run parity
        id: parity
        continue-on-error: true
        working-directory: packages/scraper
        env:
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
          # HASURA_ADMIN_SECRET は渡さない: 未設定なら request.ts が M2M Bearer に
          # フォールバックする。role machine で reservations/institutions は読める。
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}
          D1_API_ENDPOINT: ${{ vars.D1_API_ENDPOINT }}
        run: |
          set -o pipefail
          # Hasura の全件ページングは単一リクエストが 5 分ストリームタイムアウト
          # （UND_ERR_INFO: fetch failed）を踏むことがある。request.ts のリトライは
          # HTTP 5xx のみ対象で fetch タイムアウトを拾わないので、実行ごとリトライする。
          for attempt in 1 2 3; do
            echo "::group::parity (attempt ${attempt})"
            if node tools/backend/parity.ts 2>&1 | tee parity.log; then
              echo "::endgroup::"
              exit 0
            fi
            # exit 1 は「乖離あり」で PARITY_REPORT は出ている。リトライ不要。
            if grep -q '^PARITY_REPORT ' parity.log; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "parity attempt ${attempt} failed before emitting PARITY_REPORT; retrying" >&2
          done
          echo "parity failed after 3 attempts" >&2
      - name: Upsert parity tracker issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- parity-tracker -->';
            const TITLE = '[parity] Hasura と D1 の乖離';

            let log = '';
            try { log = fs.readFileSync('packages/scraper/parity.log', 'utf8'); } catch (_) { /* 下で失敗扱い */ }
            const line = log.split('\n').find((l) => l.startsWith('PARITY_REPORT '));
            if (!line) {
              // 突合そのものに到達していない = Hasura/D1 への接続障害。
              // 乖離（緑 + Issue）とは区別して job を赤にする。
              core.setFailed('PARITY_REPORT が出力されていません。突合が完遂していない可能性があります。');
              return;
            }

            let reports;
            try {
              reports = JSON.parse(line.slice('PARITY_REPORT '.length));
            } catch (error) {
              core.setFailed(`PARITY_REPORT の JSON を解析できません: ${error.message}`);
              return;
            }

            const total = reports.reduce((s, r) => s + r.missing + r.extra + r.diff, 0);

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const tracker = open.find(
              (i) => i.title === TITLE && (i.body || '').includes(MARKER)
            );

            if (total === 0) {
              core.info(`パリティ OK（${reports.length} 自治体）`);
              if (tracker) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  body: `直近の定期実行で Hasura と D1 の乖離は検出されませんでした（STALE ${reports.reduce((s, r) => s + (r.stale ?? 0), 0)} 件はゲート対象外）。自動クローズします。`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                  state: 'closed',
                });
              }
              return;
            }

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `${MARKER}\n\n`;
            body += `定期実行で Hasura と D1 の予約データに **${total} 件の乖離** を検出しました。\n\n`;
            body += `- MISSING: Hasura にあり D1 に無い / EXTRA: D1 にあり Hasura に無い / DIFF: 両方にあるが reservation が異なる\n`;
            body += `- STALE: Hasura にあり D1 に無いが、Hasura 側の更新が dual-write 開始前で止まっている行。`;
            body += `スクレイプ対象から外れた施設や horizon 外の日付で、D1 へは原理的に届かない。**乖離件数には含めない**（Issue #1622）\n`;
            body += `- 突合対象は [今日, 今日の月末 + 5 ヶ月] の窓内のみ。行キーは \`<institution_id> <date>\`\n\n`;
            body += `| 自治体 | Hasura | D1 | MISSING | EXTRA | DIFF | STALE |\n|---|---|---|---|---|---|---|\n`;
            for (const r of reports) {
              body += `| ${r.target} | ${r.hasuraRows} | ${r.d1Rows} | ${r.missing} | ${r.extra} | ${r.diff} | ${r.stale ?? 0} |\n`;
            }
            // Issue body は最大 65,536 文字。サンプルは自治体あたり 5 件だが、念のため上限を設ける。
            const MAX_SAMPLE_LINES = 100;
            const sampleLines = [];
            for (const r of reports) {
              for (const s of r.samples) sampleLines.push(`${r.target}: ${s}`);
            }
            if (sampleLines.length > 0) {
              body += `\n<details><summary>サンプル（自治体あたり最大 5 件）</summary>\n\n\`\`\`\n`;
              body += sampleLines.slice(0, MAX_SAMPLE_LINES).join('\n');
              if (sampleLines.length > MAX_SAMPLE_LINES) {
                body += `\n... 他 ${sampleLines.length - MAX_SAMPLE_LINES} 件`;
              }
              body += `\n\`\`\`\n</details>\n`;
            }
            body += `\n[実行ログ](${runUrl})\n\n`;
            body += `_最終更新: run ${context.runId}_`;

            if (tracker) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: tracker.number,
                body, state: 'open',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title: TITLE, body,
              });
            }
