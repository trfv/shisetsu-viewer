name: "Scraper Action"
description: "Run Playwright scraper tests and save results"

inputs:
  municipality:
    description: "Municipality to scrape"
    required: false
    default: ""
  shardIndex:
    description: "Shard index"
    required: true
  shardTotal:
    description: "Total number of shards"
    required: true
  nodeModulesCacheKey:
    description: "Cache key for node_modules"
    required: true
  playwrightCacheKey:
    description: "Cache key for Playwright browsers"
    required: true
  debug:
    description: "Enable debug mode"
    required: false
    default: "false"
  phase:
    description: "Phase label for failure artifact namespacing (scrape or retry)"
    required: false
    default: "scrape"
  jpProxyUrl:
    description: "JP proxy URL (repository variable JP_PROXY_URL)。scraperViaJpProxy の自治体で必須"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        cache: "npm"
        cache-dependency-path: "**/package-lock.json"
        node-version-file: .node-version
    - name: Restore cached node_modules
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: "**/node_modules"
        key: ${{ inputs.nodeModulesCacheKey }}
        # prepare が seed 済みのはず。キャッシュが消えていたら無意味な失敗ログを出す前に落とす
        fail-on-cache-miss: true
    - name: Restore Playwright browsers
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: ${{ inputs.playwrightCacheKey }}
        fail-on-cache-miss: true
    - name: Check JP proxy requirement
      id: jp-proxy
      shell: bash
      working-directory: packages/scraper
      run: |
        VIA=$(node scripts/viaJpProxy.ts "${{ inputs.municipality }}")
        if [ "${VIA}" = "true" ] && [ -z "${{ inputs.jpProxyUrl }}" ]; then
          echo "::error::${{ inputs.municipality }} は国内 proxy が必要ですが jpProxyUrl が空です（repository variable JP_PROXY_URL を確認）"
          exit 1
        fi
        echo "viaJpProxy=${VIA}" >> "$GITHUB_OUTPUT"
    - name: Connect to Tailscale
      if: steps.jp-proxy.outputs.viaJpProxy == 'true'
      uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
      with:
        oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ env.TS_OAUTH_SECRET }}
        tags: tag:ci
    - name: Run Playwright tests
      shell: bash
      working-directory: packages/scraper
      env:
        # horizon（取得期間）や開始日の計算はサイトと同じ JST で行う
        TZ: Asia/Tokyo
        # dispatch で自治体を指定した場合は registry の CI 除外（scraperCiExcluded）を解除する
        SCRAPER_FORCE_INCLUDE: ${{ inputs.municipality }}
        SCRAPER_PROXY: ${{ steps.jp-proxy.outputs.viaJpProxy == 'true' && inputs.jpProxyUrl || '' }}
      run: |
        if [ "${{ inputs.debug }}" == "true" ]; then
          DEBUG=pw:api npx playwright test ${{ inputs.municipality }} --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        else
          npx playwright test ${{ inputs.municipality }} --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        fi
    - name: Check test results
      id: check-results
      shell: bash
      working-directory: packages/scraper
      run: |
        if [ -d "test-results" ]; then
          echo "test-results-exist=true" >> $GITHUB_OUTPUT
          ls -R test-results
        else
          echo "test-results-exist=false" >> $GITHUB_OUTPUT
          echo "No test results found"
        fi
    - name: Save scraped data
      if: ${{ steps.check-results.outputs.test-results-exist == 'true' }}
      shell: bash
      working-directory: packages/scraper
      env:
        GRAPHQL_ENDPOINT: ${{ env.GRAPHQL_ENDPOINT }}
        M2M_TOKEN: ${{ env.M2M_TOKEN }}
        # dual-write（未設定なら D1 書き込みをスキップ）。OIDC トークンはジョブの
        # permissions: id-token: write により ACTIONS_ID_TOKEN_REQUEST_* が自動注入される
        D1_API_ENDPOINT: ${{ env.D1_API_ENDPOINT }}
      run: |
        node tools/updateReservations.ts ${{ inputs.municipality }}
    - name: Upload failure records
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: failures-${{ inputs.phase }}-${{ inputs.municipality }}-${{ inputs.shardIndex }}-${{ inputs.shardTotal }}
        path: packages/scraper/test-results/*/_failures/
        if-no-files-found: ignore
        overwrite: true
        retention-days: 7
