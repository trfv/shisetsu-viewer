name: "Scraper Action"
description: "Run Playwright scraper tests and save results"

inputs:
  municipality:
    description: "Municipality to scrape"
    required: false
    default: ""
  shardIndex:
    description: "Shard index"
    required: true
  shardTotal:
    description: "Total number of shards"
    required: true
  nodeModulesCacheKey:
    description: "Cache key for node_modules"
    required: true
  playwrightCacheKey:
    description: "Cache key for Playwright browsers"
    required: true
  debug:
    description: "Enable debug mode"
    required: false
    default: "false"
  phase:
    description: "Phase label for failure artifact namespacing (scrape or retry)"
    required: false
    default: "scrape"

runs:
  using: "composite"
  steps:
    - name: Set Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: "npm"
        cache-dependency-path: "**/package-lock.json"
        node-version-file: .node-version
    - name: Restore cached node_modules
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: "**/node_modules"
        key: ${{ inputs.nodeModulesCacheKey }}
        # prepare が seed 済みのはず。キャッシュが消えていたら無意味な失敗ログを出す前に落とす
        fail-on-cache-miss: true
    - name: Restore Playwright browsers
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: ${{ inputs.playwrightCacheKey }}
        fail-on-cache-miss: true
    - name: Run Playwright tests
      shell: bash
      working-directory: packages/scraper
      env:
        # horizon（取得期間）や開始日の計算はサイトと同じ JST で行う
        TZ: Asia/Tokyo
        # dispatch で自治体を指定した場合は registry の CI 除外（scraperCiExcluded）を解除する
        SCRAPER_FORCE_INCLUDE: ${{ inputs.municipality }}
      run: |
        if [ "${{ inputs.debug }}" == "true" ]; then
          DEBUG=pw:api npx playwright test ${{ inputs.municipality }} --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        else
          npx playwright test ${{ inputs.municipality }} --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        fi
    - name: Check test results
      id: check-results
      shell: bash
      working-directory: packages/scraper
      run: |
        if [ -d "test-results" ]; then
          echo "test-results-exist=true" >> $GITHUB_OUTPUT
          ls -R test-results
        else
          echo "test-results-exist=false" >> $GITHUB_OUTPUT
          echo "No test results found"
        fi
    - name: Save scraped data
      if: ${{ steps.check-results.outputs.test-results-exist == 'true' }}
      shell: bash
      working-directory: packages/scraper
      env:
        GRAPHQL_ENDPOINT: ${{ env.GRAPHQL_ENDPOINT }}
        M2M_TOKEN: ${{ env.M2M_TOKEN }}
      run: |
        node tools/updateReservations.ts ${{ inputs.municipality }}
    - name: Upload failure records
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: failures-${{ inputs.phase }}-${{ inputs.municipality }}-${{ inputs.shardIndex }}-${{ inputs.shardTotal }}
        path: packages/scraper/test-results/*/_failures/
        if-no-files-found: ignore
        overwrite: true
        retention-days: 7
